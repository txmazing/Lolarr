$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'application'
stack: 'backend'
dependsOn:
  - 'domain'
tags:
  - 'api'
  - 'fastify'

tasks:
  dev:
    command: 'pnpm run dev'
    preset: 'server'
  build:
    command: 'pnpm run build'
    deps:
      - 'domain:build'
    inputs:
      - 'package.json'
      - 'src/**/*'
      - 'tsconfig*.json'
    outputs:
      - 'dist/**/*'
  lint:
    command: 'pnpm run lint'
    inputs:
      - 'src/**/*'
      - '/eslint.config.js'
  typecheck:
    command: 'pnpm run typecheck'
    deps:
      - 'domain:typecheck'
    inputs:
      - 'src/**/*'
      - 'tests/**/*'
      - 'tsconfig.json'
  test:
    command: 'pnpm run test'
    inputs:
      - 'src/**/*'
      - 'tests/**/*'
